<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novice - The Grand Archive</title>
<style>
:root { --primary: #000000; --bg-deep: #222222; --bg-panel: #ffffff; --text-main: #111111; --text-dim: #666666; --border: #000000; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-deep); font-family: 'Times New Roman', Times, serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
#game-container { display: flex; flex-direction: row; width: 98vw; max-width: 1100px; height: 94vh; background: var(--bg-panel); border: 4px solid var(--border); box-shadow: 12px 12px 0px #000; overflow: hidden; }

/* Sidebar */
#sidebar { flex: 0 0 280px; border-right: 4px solid var(--border); padding: 20px; background: #f9f9f9; overflow-y: auto; }
.panel h3 { font-family: 'Arial', sans-serif; font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 5px; text-transform: uppercase; }
.stat-row { display: flex; justify-content: space-between; font-family: 'Courier New', monospace; font-weight: bold; margin-bottom: 5px; }
.inv-item { cursor: pointer; padding: 4px 0; border-bottom: 1px dotted #ccc; }
.inv-item:hover { color: #fff; background: #000; }
#map-display { position: relative; width: 100%; min-height: 180px; border: 2px solid #000; background: #fff; }
.map-node { position: absolute; width: 20px; height: 20px; border: 2px solid #000; background: #fff; }
.map-node.current { background: #000; }

/* Feed */
#feed-container { flex: 1; display: flex; flex-direction: column; background: #fff; }
#log { flex: 1; overflow-y: auto; padding: 30px 40px; font-size: 1.15rem; line-height: 1.7; }
.room-title { font-family: 'Arial', sans-serif; font-size: 1.4rem; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid #000; margin-bottom: 15px; }
.room-illustration { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; background-size: cover; background-position: center; border: 4px solid #000; margin: 15px 0; }
.inline-item-img { width: 240px; height: auto; display: block; margin: 15px auto; }
.hl-thing { font-family: 'Arial', sans-serif; font-weight: bold; cursor: pointer; border-bottom: 2px solid #000; }
.hl-thing:hover { color: #fff; background: #000; }
#input-area { display: flex; padding: 20px; border-top: 4px dashed #000; }
#cmd { flex: 1; border: none; font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem; outline: none; text-transform: uppercase; }
</style>
</head>
<body>
<div id="game-container">
  <aside id="sidebar">
    <section class="panel"><h3>Telemetry</h3><div class="stat-row"><span>MOVES</span><span id="move-val">0</span></div></section>
    <section class="panel"><h3>Inventory</h3><div id="inventory-list">EMPTY</div></section>
    <section class="panel" style="flex:1"><h3>Map</h3><div id="map-display"></div></section>
  </aside>
  <main id="feed-container">
      <div id="log"></div>
      <div id="input-area"><span style="margin-right:15px; font-weight:900;">></span><input type="text" id="cmd" placeholder="ENTER DIRECTIVE..." autofocus></div>
  </main>
</div>
<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>
</body>
</html>
